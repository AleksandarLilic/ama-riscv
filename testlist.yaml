_bundles:
  smoke:
    - simple
    - simd_isa
    - csr
  gate:
    - simple
    - simd_isa
    - csr
    - perf_cnts
    - timer
    - uart
    - mlp
    - aapg_short
    - riscv_isa_rv32i
    - riscv_isa_rv32i_zicsr
    - riscv_isa_rv32m
    - ustress
  full:
    - ".*"
    - ~embench
    - ~trap
    - ~act
    - ~vector
    - ~matmul

